<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FileVault - Secure File Sharing</title>
<link rel="stylesheet" href="index.css">
</head>

<body>

<div class="app">

<header>
<div class="brand">File<span>Vault</span></div>
<div class="tagline">Secure • Simple • Fast</div>
</header>

<section class="hero">
<h1>Share files securely using a one-time PIN</h1>
<p>
Upload files, generate a secure PIN, and share instantly.
No accounts, no friction — just fast and safe file transfer.
</p>
</section>

<main class="grid">

<section class="card">
<h2>Upload File</h2>

<form id="uploadForm">
<input type="file" id="file" name="file" required>
<button type="submit">Upload & Generate PIN</button>
</form>

<div id="responseMessage"></div>

<div class="features">
<span>🔒 Encrypted</span>
<span>⏱ Auto expiry</span>
<span>🚫 No account</span>
</div>

</section>

<section class="card">
<h2>Download File</h2>

<input type="text" id="pin" placeholder="Enter PIN">

<button onclick="downloadFile()">Download</button>

</section>

</main>

<footer>
© 2025 FileVault • Built by 
<a href="https://www.linkedin.com/in/raj-singh898/" target="_blank" class="footer-link">
Raj 
</a>
</footer>

</div>

<script src="frontend.js"></script>

</body>
</html>
